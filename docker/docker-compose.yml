version: '3.8'

services:
  # Service MongoDB
  mongodb_service:
    image: mongo:5.0
    container_name: mongodb_service_container
    ports:
      - "27017:27017"  # Expose le port MongoDB
    volumes:
      - mongodb_data:/data/db  # Volume pour persister les données MongoDB
    networks:
      - custom_network  # Réseau partagé entre services

  # Service pour configurer les utilisateurs MongoDB
  setup_users:
    build:
      context: ../  # Remonter d'un répertoire pour accéder au Dockerfile
      dockerfile: docker/Dockerfile
    container_name: setup_users_container
    depends_on:
      - mongodb_service  # MongoDB doit démarrer avant ce service
    command: ["python", "/app/scripts/setup_users.py"]
    volumes:
      - ../scripts:/app/scripts
    networks:
      - custom_network

  # Service pour initialiser les données utilisateur
  initialize_users:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: initialize_users_container
    depends_on:
      - mongodb_service
      - setup_users  # Exécute après la configuration des utilisateurs
    command: ["python", "/app/scripts/initialize_users.py"]
    volumes:
      - ../scripts:/app/scripts
      - ../data:/app/data  # Inclut les fichiers de données nécessaires
    networks:
      - custom_network

  # Service principal pour exécuter les commandes CRUD
  python_application:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: python_application_container
    depends_on:
      - mongodb_service
      - initialize_users  # S'assure que les utilisateurs sont initialisés avant
    command: ["python", "/app/scripts/main.py", "/app/data/processed/healthcare_data_cleaned.csv"]
    volumes:
      - ../scripts:/app/scripts
      - ../data:/app/data
    stdin_open: true  # Permet d'interagir avec le terminal
    tty: true
    networks:
      - custom_network

volumes:
  mongodb_data:  # Volume pour persister les données MongoDB
    driver: local

networks:
  custom_network:  # Réseau partagé entre les services
    driver: bridge
